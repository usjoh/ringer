<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Ringside</title>
  <style>
    :root {
      color-scheme: dark;
      --ground: #0b0e14;
      --surface: #141a26;
      --ink: #e9eef7;
      --muted: #8fa0b6;
      --hairline: rgba(143, 160, 182, .22);
      --accent: #35d0ff;
      --pass: #45d17e;
      --fail: #ff5f6b;
      --waiting: #6f7c92;
      --quote-bg: rgba(255, 95, 107, .08);
    }
    @media (prefers-color-scheme: light) {
      :root {
        color-scheme: light;
        --ground: #f2f5f9;
        --surface: #ffffff;
        --ink: #17202e;
        --muted: #5a6a7e;
        --hairline: rgba(90, 106, 126, .28);
        --accent: #007fb0;
        --pass: #178a4c;
        --fail: #cc3340;
        --waiting: #7d8ba0;
        --quote-bg: rgba(204, 51, 64, .07);
      }
    }
    :root[data-theme="dark"] {
      color-scheme: dark;
      --ground: #0b0e14; --surface: #141a26; --ink: #e9eef7; --muted: #8fa0b6;
      --hairline: rgba(143,160,182,.22); --accent: #35d0ff; --pass: #45d17e;
      --fail: #ff5f6b; --waiting: #6f7c92; --quote-bg: rgba(255,95,107,.08);
    }
    :root[data-theme="light"] {
      color-scheme: light;
      --ground: #f2f5f9; --surface: #ffffff; --ink: #17202e; --muted: #5a6a7e;
      --hairline: rgba(90,106,126,.28); --accent: #007fb0; --pass: #178a4c;
      --fail: #cc3340; --waiting: #7d8ba0; --quote-bg: rgba(204,51,64,.07);
    }

    * { box-sizing: border-box; }
    html, body { min-height: 100%; }
    body {
      background: var(--ground);
      color: var(--ink);
      font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", sans-serif;
      line-height: 1.5;
      margin: 0;
    }
    button, select {
      color: inherit;
      font: inherit;
    }
    button { cursor: pointer; }
    button:focus-visible,
    select:focus-visible,
    iframe:focus-visible {
      outline: 2px solid var(--accent);
      outline-offset: 2px;
    }
    [hidden] { display: none !important; }
    .page {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    .mono {
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      font-variant-numeric: tabular-nums;
    }

    .corner {
      display: flex; align-items: baseline; gap: 12px; flex-wrap: wrap;
      margin-bottom: clamp(14px, 3vw, 26px);
    }
    .live-dot {
      width: 9px; height: 9px; border-radius: 50%;
      background: var(--waiting); align-self: center; flex: 0 0 9px;
    }
    .live-dot.live { background: var(--accent); }
    @media (prefers-reduced-motion: no-preference) {
      .live-dot.live { animation: pulse 1.4s ease-in-out infinite; }
      @keyframes pulse { 50% { opacity: .35; } }
    }
    .eyebrow {
      font-size: 12px; font-weight: 700; letter-spacing: .12em;
      text-transform: uppercase; color: var(--muted);
    }
    .eyebrow b { color: var(--ink); }
    .clock { margin-left: auto; font-size: 12px; color: var(--muted); }

    .topbar {
      min-height: 42px;
      margin: 0;
      padding: 9px clamp(12px, 2vw, 22px);
      border-bottom: 1px solid var(--hairline);
      gap: 10px;
    }
    .machine-strip {
      display: flex;
      gap: 4px;
      align-items: center;
      min-width: 60px;
      max-width: 220px;
      flex: 0 1 auto;
    }
    .machine-strip button {
      flex: 1 1 0;
      min-width: 14px;
      height: 7px;
      border: 0;
      border-radius: 4px;
      padding: 0;
      background: var(--waiting);
      opacity: .45;
      cursor: pointer;
    }
    .machine-strip button.live { background: var(--accent); opacity: 1; }
    .machine-strip button.pass { background: var(--pass); opacity: .9; }
    .machine-strip button.fail { background: var(--fail); opacity: .9; }
    .machine-strip button[aria-current="true"] { outline: 1.5px solid var(--ink); outline-offset: 2px; }
    @media (prefers-reduced-motion: no-preference) {
      .machine-strip button.live { animation: pulse 1.4s ease-in-out infinite; }
    }
    select,
    .artifact-tools select {
      appearance: none;
      -webkit-appearance: none;
      padding: 7px 30px 7px 12px;
      border: 1px solid var(--hairline);
      border-radius: 7px;
      background-color: var(--surface);
      background-image: url("data:image/svg+xml;charset=utf-8,%3Csvg xmlns='http://www.w3.org/2000/svg' width='10' height='6'%3E%3Cpath d='M1 1l4 4 4-4' fill='none' stroke='%238fa0b6' stroke-width='1.6'/%3E%3C/svg%3E");
      background-repeat: no-repeat;
      background-position: right 11px center;
      color: var(--ink);
      font-size: 13px;
      line-height: 1.3;
      max-width: 100%;
    }
    select:focus-visible,
    summary.run-head:focus-visible,
    .machine-strip button:focus-visible {
      outline: 2px solid var(--accent);
      outline-offset: 2px;
    }
    .artifact-status { color: var(--ink); opacity: .75; }
    .wordmark {
      font-variant-caps: all-small-caps;
      letter-spacing: .1em;
    }
    .topbar-main {
      min-width: 0;
      display: flex;
      align-items: baseline;
      gap: 12px;
    }
    .reconnect {
      color: var(--muted);
      font-size: 12px;
    }
    .tabs {
      display: flex;
      gap: 18px;
      padding: 8px clamp(12px, 2vw, 22px) 0;
      border-bottom: 1px solid var(--hairline);
    }
    .tab {
      appearance: none;
      border: 0;
      border-bottom: 2px solid transparent;
      background: transparent;
      color: var(--muted);
      padding: 8px 0 10px;
      font-size: 13px;
      font-weight: 700;
    }
    .tab[aria-selected="true"] {
      color: var(--ink);
      border-bottom-color: var(--accent);
    }
    main {
      flex: 1 1 auto;
      min-height: 0;
      overflow: auto;
    }
    .panel {
      min-height: 100%;
    }
    .empty {
      color: var(--muted);
      font-size: 14px;
      padding: clamp(26px, 6vw, 60px) clamp(12px, 2vw, 22px);
    }

    .run {
      padding: clamp(18px, 3vw, 28px) clamp(12px, 2vw, 22px) clamp(20px, 3vw, 30px);
      border-bottom: 1px solid var(--hairline);
    }
    .agents { margin-top: clamp(16px, 3vw, 28px); }
    summary.run-head { cursor: pointer; list-style: none; }
    summary.run-head::-webkit-details-marker { display: none; }
    summary.run-head::before {
      content: "▸";
      color: var(--muted);
      font-size: 11px;
      margin-right: 2px;
      transition: transform .15s ease;
      display: inline-block;
    }
    details[open] > summary.run-head::before { transform: rotate(90deg); }
    .run-head {
      margin-bottom: clamp(12px, 2vw, 18px);
    }
    .run-head .eyebrow {
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .identity {
      color: var(--muted);
      font-size: 13px;
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .run-stats {
      color: var(--muted);
      font-size: 12px;
      white-space: nowrap;
    }

    .rounds { display: flex; gap: 5px; margin-bottom: 8px; }
    .rounds span { flex: 1; min-width: 10px; height: 7px; border-radius: 4px; background: var(--waiting); opacity: .45; }
    .rounds .pass { background: var(--pass); opacity: 1; }
    .rounds .working { background: var(--accent); opacity: 1; }
    .rounds .retry,
    .rounds .fail { background: var(--fail); opacity: 1; }
    @media (prefers-reduced-motion: no-preference) {
      .rounds .working, .rounds .retry { animation: pulse 1.4s ease-in-out infinite; }
    }
    .legend { font-size: 12.5px; color: var(--muted); margin: 0 0 clamp(12px, 2vw, 18px); }

    section h2 {
      font-size: 12px; font-weight: 700; letter-spacing: .1em;
      text-transform: uppercase; color: var(--muted);
      margin: 0 0 4px; padding-bottom: 8px;
      border-bottom: 1px solid var(--hairline);
    }
    .workers { margin-top: clamp(14px, 2vw, 20px); }
    .worker {
      width: 100%;
      display: grid;
      grid-template-columns: 18px minmax(0,1fr) auto auto;
      gap: 4px 12px; align-items: baseline;
      padding: 12px 0; border: 0; border-bottom: 1px solid var(--hairline);
      background: transparent;
      text-align: left;
    }
    .worker:hover .name,
    .worker:focus-visible .name { color: var(--accent); }
    .worker[aria-expanded="true"] .name { color: var(--accent); }
    .glyph { width: 11px; height: 11px; border-radius: 50%; align-self: center; }
    .glyph.pass { background: var(--pass); }
    .glyph.working { background: var(--accent); }
    .glyph.retry,
    .glyph.fail { background: var(--fail); }
    .glyph.waiting { background: transparent; border: 1.5px solid var(--waiting); }
    @media (prefers-reduced-motion: no-preference) {
      .glyph.working, .glyph.retry { animation: pulse 1.4s ease-in-out infinite; }
    }
    .worker .name { font-weight: 650; font-size: 15px; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .worker .state { font-size: 13px; font-weight: 650; white-space: nowrap; }
    .state.pass { color: var(--pass); }
    .state.working { color: var(--accent); }
    .state.retry,
    .state.fail { color: var(--fail); }
    .state.waiting { color: var(--waiting); }
    .worker .time { font-size: 12.5px; color: var(--muted); white-space: nowrap; }
    .worker .activity {
      grid-column: 2 / -1; font-size: 13px; color: var(--muted);
      min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }
    .stream {
      padding: 0 0 14px 30px;
      border-bottom: 1px solid var(--hairline);
    }
    .stream-head {
      display: flex;
      gap: 12px;
      align-items: baseline;
      color: var(--muted);
      font-size: 12px;
      padding: 10px 0 8px;
    }
    .stream pre {
      max-height: 45vh;
      margin: 0;
      overflow: auto;
      white-space: pre-wrap;
      overflow-wrap: anywhere;
      background: var(--surface);
      color: var(--ink);
      border-left: 2px solid var(--accent);
      padding: 12px;
      font-size: 12px;
      line-height: 1.45;
    }
    .catch {
      margin: 8px 0 0; padding: 8px 12px;
      background: var(--quote-bg);
      border-left: 2px solid var(--fail);
      border-radius: 0 6px 6px 0;
      font-size: 13px; color: var(--muted);
      overflow-wrap: break-word;
    }
    .catch b { color: var(--fail); font-weight: 650; }

    .artifact-layout {
      min-height: calc(100vh - 83px);
      display: grid;
      grid-template-columns: minmax(0, 1fr);
    }
    .artifact-main,
    .agents {
      width: min(100%, 960px);
      margin-inline: auto;
    }
    .artifact-row {
      width: 100%;
      display: grid;
      grid-template-columns: 18px minmax(0, 1fr);
      gap: 10px;
      align-items: center;
      padding: 12px clamp(12px, 2vw, 18px);
      border: 0;
      border-bottom: 1px solid var(--hairline);
      background: transparent;
      text-align: left;
    }
    .artifact-row[aria-current="true"] {
      background: var(--surface);
    }
    .artifact-state-dot {
      width: 9px;
      height: 9px;
      border-radius: 50%;
      background: var(--waiting);
    }
    .artifact-row.live .artifact-state-dot { background: var(--accent); }
    .artifact-row.pass .artifact-state-dot { background: var(--pass); }
    .artifact-row.fail .artifact-state-dot,
    .artifact-row.died .artifact-state-dot { background: var(--fail); }
    @media (prefers-reduced-motion: no-preference) {
      .artifact-row.live .artifact-state-dot { animation: pulse 1.4s ease-in-out infinite; }
    }
    .artifact-row-main {
      min-width: 0;
      display: grid;
      gap: 1px;
    }
    .artifact-name {
      font-weight: 650;
      font-size: 14px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .artifact-age {
      color: var(--muted);
      font-size: 12px;
    }
    .artifact-main {
      min-width: 0;
      display: grid;
      grid-template-rows: auto minmax(0, 1fr);
    }
    .artifact-tools {
      display: grid;
      grid-template-columns: minmax(220px, max-content) minmax(0, 1fr) minmax(180px, max-content);
      gap: 12px;
      align-items: center;
      padding: 10px clamp(12px, 2vw, 18px);
      border-bottom: 1px solid var(--hairline);
    }
    .artifact-status {
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      color: var(--muted);
      font-size: 13px;
    }
    .artifact-tools select,
    .artifact-tools button {
      min-height: 30px;
      background: var(--surface);
      border: 1px solid var(--hairline);
      border-radius: 6px;
      color: var(--ink);
      font-size: 12px;
    }
    .artifact-tools select {
      min-width: 0;
      padding: 0 8px;
    }
    .artifact-tools button {
      padding: 0 10px;
      font-weight: 700;
    }
    .frame-wrap {
      min-height: 120px;
      background: var(--surface);
      border: 0;
    }
    .frame-wrap iframe {
      display: block;
      width: 100%;
      border: 0;
      background: var(--surface);
    }
    .artifact-error {
      color: var(--muted);
      font-size: 14px;
      padding: clamp(22px, 4vw, 42px);
    }

    @media (max-width: 760px) {
      .topbar-main { flex-wrap: wrap; gap: 6px 10px; }
      .run-head .clock { width: 100%; margin-left: 21px; }
      .artifact-layout {
        min-height: auto;
        display: block;
      }
      .artifact-rail {
        border-right: 0;
        border-bottom: 1px solid var(--hairline);
        max-height: 34vh;
        overflow: auto;
      }
      .artifact-tools {
        grid-template-columns: 1fr;
      }
      .frame-wrap iframe {
        min-height: 58vh;
      }
    }
    @media (max-width: 560px) {
      .worker {
        grid-template-columns: 18px minmax(0,1fr);
      }
      .worker .state,
      .worker .time,
      .worker .activity {
        grid-column: 2 / -1;
      }
      .worker .state,
      .worker .time {
        white-space: normal;
      }
      .stream {
        padding-left: 0;
      }
    }
  </style>
</head>
<body>
  <div class="page">
    <header class="corner topbar">
      <span id="top-dot" class="live-dot" aria-hidden="true"></span>
      <div class="topbar-main">
        <span class="eyebrow wordmark"><b>Ringside</b></span>
        <span id="reconnect" class="reconnect mono" hidden>reconnecting…</span>
      </div>
      <div id="machine-strip" class="machine-strip" role="group" aria-label="Everything running on this machine"></div>
      <time id="clock" class="clock mono"></time>
    </header>

    <main>
      <section id="artifacts-panel" class="panel">
        <div class="artifact-layout">
          <section class="artifact-main" aria-label="Artifact preview">
            <div class="artifact-tools">
              <select id="artifact-picker" class="mono" aria-label="Artifact"></select>
              <div id="artifact-status" class="artifact-status">No artifact selected.</div>
              <select id="artifact-version" class="mono" aria-label="Artifact version"></select>
            </div>
            <div id="frame-wrap" class="frame-wrap">
              <div class="artifact-error">No artifacts yet.</div>
            </div>
            <section id="agents" class="agents" aria-label="Agents">
              <div id="runs"></div>
            </section>
          </section>
        </div>
      </section>
    </main>
  </div>

  <script>
  (() => {
    const TAB_KEY = "ringside-tab";
    const ARTIFACT_KEY = "ringside-artifact-selection";
    const state = {
      runs: [],
      active: {},
      artifacts: [],
      runError: null,
      libraryError: null,
      tab: normalizeTab(localStorage.getItem(TAB_KEY)) || "live",
      hasStoredTab: Boolean(normalizeTab(localStorage.getItem(TAB_KEY))),
      expanded: null,
      logTimer: null,
      artifactName: sessionStorage.getItem(ARTIFACT_KEY) || "",
      artifactManual: Boolean(sessionStorage.getItem(ARTIFACT_KEY)),
      artifactVersion: "live",
      frameKey: "",
      frameContent: "",
      frameRequest: 0,
      rendering: false,
      runOpen: {}
    };

    const els = {
      topDot: document.getElementById("top-dot"),
      reconnect: document.getElementById("reconnect"),
      clock: document.getElementById("clock"),
      runs: document.getElementById("runs"),
      artifactPicker: document.getElementById("artifact-picker"),
      artifactStatus: document.getElementById("artifact-status"),
      artifactVersion: document.getElementById("artifact-version"),
      frameWrap: document.getElementById("frame-wrap")
    };

    function normalizeTab(value) {
      return value === "live" || value === "artifacts" ? value : "";
    }

    function tickClock() {
      els.clock.textContent = new Date().toLocaleTimeString([], {
        hour: "2-digit",
        minute: "2-digit",
        second: "2-digit"
      });
    }

    function numberOrZero(value) {
      const number = Number(value);
      return Number.isFinite(number) ? number : 0;
    }

    function parseTime(value) {
      const stamp = Date.parse(value || "");
      return Number.isFinite(stamp) ? stamp : 0;
    }

    function elapsedForRun(run) {
      const current = Number(run.elapsed_s);
      if (run.state !== "live" && Number.isFinite(current)) return current;
      const started = parseTime(run.started_at);
      if (!started) return Number.isFinite(current) ? current : 0;
      return Math.max(Number.isFinite(current) ? current : 0, (Date.now() - started) / 1000);
    }

    function formatDuration(seconds) {
      const total = Math.max(0, Math.floor(numberOrZero(seconds)));
      if (!total) return "—";
      const hours = Math.floor(total / 3600);
      const minutes = Math.floor((total % 3600) / 60);
      const secs = total % 60;
      if (hours) return `${hours}h ${String(minutes).padStart(2, "0")}m`;
      if (minutes) return `${minutes}m ${String(secs).padStart(2, "0")}s`;
      return `${secs}s`;
    }

    function formatTokens(value) {
      return `${Math.round(numberOrZero(value)).toLocaleString()} tok`;
    }

    function relativeAgo(value) {
      const stamp = parseTime(value);
      if (!stamp) return "unknown";
      const diff = Math.max(0, Math.floor((Date.now() - stamp) / 1000));
      if (diff < 60) return `${diff}s ago`;
      if (diff < 3600) return `${Math.floor(diff / 60)}m ago`;
      if (diff < 86400) return `${Math.floor(diff / 3600)}h ago`;
      return `${Math.floor(diff / 86400)}d ago`;
    }

    function runId(run, index = 0) {
      return String(run.run_id || run.id || `${run.identity || "run"}-${run.run_name || "ringer"}-${run.started_at || index}`);
    }

    function taskKey(task, index = 0) {
      return String(task.key || task.id || task.name || `task-${index}`);
    }

    function normalizeRuns(payload) {
      const raw = Array.isArray(payload) ? payload : (Array.isArray(payload?.runs) ? payload.runs : []);
      const runs = raw.filter(Boolean).map((run, index) => {
        const totals = run.totals && typeof run.totals === "object" ? run.totals : {};
        const summary = run.summary && typeof run.summary === "object" ? run.summary : {};
        const rawState = String(run.state || "").toLowerCase();
        const live = rawState === "live" || (!run.finished && rawState !== "finished" && rawState !== "died");
        const stateName = rawState === "died" ? "died" : (live ? "live" : "finished");
        const pass = numberOrZero(run.pass ?? summary.pass ?? totals.pass);
        const fail = numberOrZero(run.fail ?? summary.fail ?? totals.fail);
        const tokens = numberOrZero(run.tokens ?? summary.tokens ?? totals.tokens);
        return {
          ...run,
          __index: index,
          __id: runId(run, index),
          state: stateName,
          run_name: String(run.run_name || "ringer"),
          identity: String(run.identity || "unknown"),
          started_at: String(run.started_at || ""),
          elapsed_s: elapsedForRun({...run, state: stateName}),
          pass,
          fail,
          tokens,
          tasks: Array.isArray(run.tasks) ? run.tasks : []
        };
      });
      runs.sort((left, right) => {
        const leftLive = left.state === "live" ? 0 : 1;
        const rightLive = right.state === "live" ? 0 : 1;
        if (leftLive !== rightLive) return leftLive - rightLive;
        return parseTime(right.started_at) - parseTime(left.started_at);
      });
      return runs.slice(0, 12);
    }

    function taskKind(task) {
      const status = String(task?.status || task?.state || "").toLowerCase();
      const verdict = String(task?.verdict || "").toUpperCase();
      if (status === "pass" || verdict === "PASS") return "pass";
      if (status === "retrying" || status === "redoing") return "retry";
      if (status === "running" || status === "verifying" || status === "working") return "working";
      if (status === "fail" || status === "failed" || status === "error" || status === "timeout" || status === "died" || verdict === "FAIL") return "fail";
      return "waiting";
    }

    function taskStateText(kind) {
      if (kind === "pass") return "finished & checked";
      if (kind === "working") return "working";
      if (kind === "retry") return "sent back — redoing";
      if (kind === "fail") return "failed";
      return "waiting";
    }

    function taskIsRunning(task) {
      const kind = taskKind(task);
      return kind === "working" || kind === "retry";
    }

    function taskActivity(task) {
      const direct = String(task?.activity || "").trim();
      if (direct) return direct;
      const tail = Array.isArray(task?.log_tail) ? task.log_tail : [];
      return tail.map(line => String(line).trim()).filter(Boolean).slice(-1)[0] || "";
    }

    function setTab(_tab, _persist) { /* unified page — tabs removed */ }

    function preserveScroll(mutate) {
      const scroller = document.scrollingElement || document.documentElement;
      const pageY = scroller.scrollTop;
      mutate();
      scroller.scrollTop = pageY;
    }

    function renderTop() {
      const anyLive = state.runs.some(run => run.state === "live");
      els.topDot.classList.toggle("live", anyLive);
      els.reconnect.hidden = !(state.runError || state.libraryError);
    }

    function renderLive() {
      const fragment = document.createDocumentFragment();
      if (!state.runs.length) {
        const empty = document.createElement("div");
        empty.className = "empty";
        empty.textContent = "Nothing has run yet. Start something with: ./ringer.py run manifest.json";
        fragment.appendChild(empty);
        state.rendering = true;
        preserveScroll(() => { els.runs.replaceChildren(fragment); });
        state.rendering = false;
        syncLogPolling();
        return;
      }

      const selectedName = state.artifactName;
      const visibleRuns = selectedName ? state.runs.filter(run => run.run_name === selectedName) : state.runs;
      const roundOrder = [...visibleRuns].sort((a, b) => parseTime(a.started_at) - parseTime(b.started_at));
      const roundOf = run => roundOrder.indexOf(run) + 1;
      if (!visibleRuns.length) {
        const note = document.createElement("p");
        note.className = "empty-note";
        note.textContent = "No agent activity recorded for this artifact yet.";
        fragment.appendChild(note);
      }
      visibleRuns.forEach((run, runIndex) => {
        const section = document.createElement("details");
        section.className = `run ${run.state}`;
        const preferred = state.runOpen[run.__id];
        section.open = preferred !== undefined ? preferred : (run.state === "live" || runIndex === 0);
        section.addEventListener("toggle", () => {
          if (!state.rendering) state.runOpen[run.__id] = section.open;
        });

        const head = document.createElement("summary");
        head.className = "corner run-head";
        const dot = document.createElement("span");
        dot.className = `live-dot ${run.state === "live" ? "live" : ""}`;
        dot.setAttribute("aria-hidden", "true");
        const title = document.createElement("span");
        title.className = "eyebrow";
        const titleBold = document.createElement("b");
        titleBold.textContent = `Round ${roundOf(run)}`;
        title.appendChild(titleBold);
        const identity = document.createElement("span");
        identity.className = "identity";
        identity.textContent = `${run.tasks.length} agent${run.tasks.length === 1 ? "" : "s"} · ${run.identity}`;
        const stats = document.createElement("span");
        stats.className = "clock mono run-stats";
        const outcome = run.state === "live"
          ? `${run.pass} passed so far`
          : (run.fail > 0 ? `${run.pass} passed · ${run.fail} failed` : `all ${run.pass} passed`);
        const tok = run.tokens > 0 ? ` · ${formatTokens(run.tokens)}` : "";
        stats.textContent = `${outcome} · ${formatDuration(run.elapsed_s)}${tok}`;
        head.append(dot, title, identity, stats);
        section.appendChild(head);

        const rounds = document.createElement("div");
        rounds.className = "rounds";
        const counts = {pass: 0, working: 0, retry: 0, waiting: 0, fail: 0};
        run.tasks.forEach((task, index) => {
          const kind = taskKind(task);
          counts[kind] += 1;
          const span = document.createElement("span");
          span.className = kind;
          span.setAttribute("aria-hidden", "true");
          span.dataset.taskKey = taskKey(task, index);
          rounds.appendChild(span);
        });
        rounds.setAttribute("role", "img");
        rounds.setAttribute(
          "aria-label",
          `${run.tasks.length} workers: ${counts.pass} finished, ${counts.working} working, ${counts.retry} sent back, ${counts.waiting} waiting, ${counts.fail} failed`
        );
        section.appendChild(rounds);

        const legend = document.createElement("p");
        legend.className = "legend";
        legend.textContent = `${counts.pass} finished & checked · ${counts.working} working · ${counts.retry} sent back · ${counts.waiting} waiting · ${counts.fail} failed`;
        section.appendChild(legend);

        const workers = document.createElement("div");
        workers.className = "workers";
        if (!run.tasks.length) {
          const empty = document.createElement("div");
          empty.className = "empty";
          empty.textContent = "No workers have reported in yet.";
          workers.appendChild(empty);
        }
        run.tasks.forEach((task, taskIndex) => {
          const key = taskKey(task, taskIndex);
          const kind = taskKind(task);
          const isExpanded = state.expanded && state.expanded.runId === run.__id && state.expanded.taskKey === key;
          const row = document.createElement("button");
          row.className = "worker";
          row.type = "button";
          row.setAttribute("aria-expanded", String(Boolean(isExpanded)));
          row.addEventListener("click", () => toggleWorker(run, task, taskIndex));

          const glyph = document.createElement("span");
          glyph.className = `glyph ${kind}`;
          glyph.setAttribute("aria-hidden", "true");
          const name = document.createElement("span");
          name.className = "name";
          name.textContent = key;
          const taskState = document.createElement("span");
          taskState.className = `state ${kind}`;
          taskState.textContent = taskStateText(kind);
          const time = document.createElement("span");
          time.className = "time mono";
          time.textContent = kind === "waiting" ? "—" : formatDuration(task.elapsed_s);
          row.append(glyph, name, taskState, time);

          const activity = taskIsRunning(task) ? taskActivity(task) : "";
          if (activity) {
            const line = document.createElement("span");
            line.className = "activity";
            line.textContent = activity;
            row.appendChild(line);
          }
          workers.appendChild(row);

          if (isExpanded) workers.appendChild(renderStream(run, task, taskIndex));
        });
        section.appendChild(workers);
        fragment.appendChild(section);
        if (runIndex < state.runs.length - 1) section.setAttribute("aria-label", run.run_name);
      });

      state.rendering = true;
      preserveScroll(() => { els.runs.replaceChildren(fragment); });
      state.rendering = false;
      syncLogPolling();
    }

    function renderStream(run, task, taskIndex) {
      const panel = document.createElement("div");
      panel.className = "stream";
      panel.dataset.stream = "true";
      const head = document.createElement("div");
      head.className = "stream-head mono";
      const title = document.createElement("span");
      title.textContent = "Live work stream";
      const meta = document.createElement("span");
      meta.textContent = taskIsRunning(task) ? "polling every 1s" : "final snapshot";
      head.append(title, meta);
      panel.appendChild(head);

      const pre = document.createElement("pre");
      pre.tabIndex = 0;
      pre.textContent = state.expanded?.logText || "No log output yet.";
      pre.addEventListener("scroll", () => {
        const distance = pre.scrollHeight - pre.scrollTop - pre.clientHeight;
        if (state.expanded) {
          state.expanded.pinned = distance < 28;
          state.expanded.scrollTop = pre.scrollTop;
        }
      });
      panel.appendChild(pre);
      if (state.expanded?.error) {
        const error = document.createElement("p");
        error.className = "catch";
        const bold = document.createElement("b");
        bold.textContent = "Log stream unavailable:";
        error.append(bold, document.createTextNode(` ${state.expanded.error}`));
        panel.appendChild(error);
      }
      requestAnimationFrame(() => {
        if (state.expanded?.pinned !== false) {
          pre.scrollTop = pre.scrollHeight;
        } else {
          pre.scrollTop = state.expanded?.scrollTop || 0;
        }
      });
      return panel;
    }

    function toggleWorker(run, task, taskIndex) {
      const key = taskKey(task, taskIndex);
      if (state.expanded && state.expanded.runId === run.__id && state.expanded.taskKey === key) {
        closeWorker();
        return;
      }
      state.expanded = {
        runId: run.__id,
        taskKey: key,
        logText: "",
        error: "",
        pinned: true,
        scrollTop: 0,
        finalFetched: false
      };
      renderLive();
      fetchExpandedLog();
    }

    function closeWorker() {
      state.expanded = null;
      if (state.logTimer) {
        clearInterval(state.logTimer);
        state.logTimer = null;
      }
      renderLive();
    }

    function findExpandedTask() {
      if (!state.expanded) return null;
      const run = state.runs.find(item => item.__id === state.expanded.runId);
      if (!run) return null;
      const index = run.tasks.findIndex((task, taskIndex) => taskKey(task, taskIndex) === state.expanded.taskKey);
      if (index < 0) return null;
      return {run, task: run.tasks[index], index};
    }

    async function fetchExpandedLog() {
      const expanded = state.expanded;
      const found = findExpandedTask();
      if (!expanded || !found) return;
      const path = `/logs/${encodeURIComponent(found.run.__id)}/${encodeURIComponent(expanded.taskKey)}`;
      try {
        const response = await fetch(path, {cache: "no-store"});
        if (!response.ok) throw new Error(`HTTP ${response.status}`);
        const raw = await response.text();
        // Worker logs carry raw terminal output; strip ANSI escapes for the stream view.
        const text = raw.replace(/\[[0-9;?]*[ -\/]*[@-~]/g, "").replace(/\[[0-9;]{1,6}m/g, "");
        if (state.expanded !== expanded) return;
        expanded.logText = text || "No log output yet.";
        expanded.error = "";
        updateStreamText(expanded.logText);
      } catch (error) {
        if (state.expanded !== expanded) return;
        expanded.error = error?.message || "could not read log";
        renderLive();
      }
    }

    function updateStreamText(text) {
      const pre = els.runs.querySelector(".stream pre");
      if (!pre) return;
      const shouldPin = state.expanded?.pinned !== false || pre.scrollHeight - pre.scrollTop - pre.clientHeight < 28;
      const scrollTop = pre.scrollTop;
      pre.textContent = text || "No log output yet.";
      if (shouldPin) {
        pre.scrollTop = pre.scrollHeight;
      } else {
        pre.scrollTop = scrollTop;
        if (state.expanded) state.expanded.scrollTop = scrollTop;
      }
    }

    function syncLogPolling() {
      if (!state.expanded) return;
      const found = findExpandedTask();
      if (!found) {
        closeWorker();
        return;
      }
      const running = taskIsRunning(found.task);
      if (running && !state.logTimer) {
        state.logTimer = setInterval(fetchExpandedLog, 1000);
      }
      if (!running && state.logTimer) {
        clearInterval(state.logTimer);
        state.logTimer = null;
      }
      if (!running && !state.expanded.finalFetched) {
        state.expanded.finalFetched = true;
        fetchExpandedLog();
      }
    }

    function normalizeArtifactState(value) {
      const text = String(value || "").toLowerCase();
      if (text === "live") return "live";
      if (text === "pass" || text === "finished") return "pass";
      if (text === "fail") return "fail";
      if (text === "died") return "died";
      return "unknown";
    }

    function artifactStateClass(value) {
      const normalized = normalizeArtifactState(value);
      return normalized === "died" ? "fail" : normalized;
    }

    function artifactVersionKey(version, index) {
      return String(version.path || version.run_id || `${version.finished_at || ""}-${version.outcome || ""}-${index}`);
    }

    function normalizeLibrary(payload) {
      const artifacts = payload?.artifacts && typeof payload.artifacts === "object" && !Array.isArray(payload.artifacts)
        ? payload.artifacts
        : {};
      return Object.entries(artifacts).map(([name, entry]) => {
        const item = entry && typeof entry === "object" ? entry : {};
        const versions = Array.isArray(item.versions) ? item.versions : [];
        const normalizedVersions = versions.map((version, index) => {
          const value = version && typeof version === "object" ? version : {};
          return {
            key: artifactVersionKey(value, index),
            run_id: String(value.run_id || ""),
            path: String(value.path || ""),
            finished_at: String(value.finished_at || ""),
            finishedTs: parseTime(value.finished_at),
            outcome: normalizeArtifactState(value.outcome),
            tasks_pass: numberOrZero(value.tasks_pass),
            tasks_fail: numberOrZero(value.tasks_fail)
          };
        }).sort((left, right) => right.finishedTs - left.finishedTs);
        const updatedAt = String(item.updated_at || "");
        const updatedTs = parseTime(updatedAt) || normalizedVersions[0]?.finishedTs || 0;
        return {
          name: String(name || "artifact"),
          live_path: String(item.live_path || ""),
          state: normalizeArtifactState(item.state),
          identity: String(item.identity || "unknown"),
          current_run_id: String(item.current_run_id || ""),
          updated_at: updatedAt,
          updatedTs,
          versions: normalizedVersions
        };
      }).filter(item => item.name).sort((left, right) => {
        const leftLive = left.state === "live" ? 1 : 0;
        const rightLive = right.state === "live" ? 1 : 0;
        if (leftLive !== rightLive) return rightLive - leftLive;
        // Stable within each group: two live runs must never swap rows as
        // their "updated Ns ago" leapfrogs every flush (demo-night lesson).
        return left.name.localeCompare(right.name);
      });
    }

    function sanitizeArtifactName(value) {
      return String(value || "artifact").replace(/[^A-Za-z0-9._-]+/g, "-").replace(/^[.-]+|[.-]+$/g, "") || "artifact";
    }

    function artifactLiveHref(name) {
      return `/artifacts/live/${encodeURIComponent(sanitizeArtifactName(name))}.html`;
    }

    function artifactPathHref(path) {
      const text = String(path || "").replace(/\\/g, "/");
      const marker = "/artifacts/";
      const index = text.lastIndexOf(marker);
      const relative = index >= 0
        ? text.slice(index + marker.length)
        : text.replace(/^\/+/, "").replace(/^artifacts\//, "");
      const parts = relative.split("/").filter(Boolean).map(encodeURIComponent);
      return parts.length ? `/artifacts/${parts.join("/")}` : "";
    }

    function newestArtifact() {
      const live = state.artifacts.filter(item => item.state === "live").sort((left, right) => right.updatedTs - left.updatedTs);
      return live[0] || [...state.artifacts].sort((left, right) => right.updatedTs - left.updatedTs)[0] || null;
    }

    function selectedArtifact() {
      return state.artifacts.find(item => item.name === state.artifactName) || null;
    }

    function syncArtifactSelection() {
      if (!state.artifacts.length) {
        state.artifactName = "";
        state.artifactVersion = "live";
        return;
      }
      const current = selectedArtifact();
      if (state.artifactManual && current) {
        if (state.artifactVersion !== "live" && !current.versions.some(version => version.key === state.artifactVersion)) {
          state.artifactVersion = "live";
        }
        return;
      }
      if (state.artifactManual && !current) {
        state.artifactManual = false;
        sessionStorage.removeItem(ARTIFACT_KEY);
      }
      // Only choose FOR the user when nothing is on screen yet. A new live
      // run must never steal the view mid-review (demo-night lesson).
      if (current) return;
      const target = newestArtifact();
      if (target) {
        state.artifactName = target.name;
        state.artifactVersion = "live";
      }
    }

    function selectedArtifactTarget() {
      const artifact = selectedArtifact();
      if (!artifact) return null;
      if (state.artifactVersion !== "live") {
        const version = artifact.versions.find(item => item.key === state.artifactVersion);
        if (version) {
          const src = artifactPathHref(version.path);
          return {
            artifact,
            version,
            src,
            key: `${src}|version|${version.key}`
          };
        }
      }
      const src = artifactLiveHref(artifact.name);
      return {
        artifact,
        version: null,
        src,
        key: `${src}|current|${artifact.state}`
      };
    }

    function renderArtifacts() {
      syncArtifactSelection();
      const options = document.createDocumentFragment();
      if (!state.artifacts.length) {
        const option = document.createElement("option");
        option.value = "";
        option.textContent = state.libraryError ? "Ringside reconnecting…" : "No artifacts yet";
        options.appendChild(option);
      } else {
        state.artifacts.forEach(artifact => {
          const option = document.createElement("option");
          option.value = artifact.name;
          const marker = artifact.state === "live" ? "● " : "";
          option.textContent = `${marker}${artifact.name} — ${artifact.state === "live" ? "live" : artifact.state} · updated ${relativeAgo(artifact.updated_at)}`;
          option.selected = artifact.name === state.artifactName;
          options.appendChild(option);
        });
      }
      els.artifactPicker.replaceChildren(options);
      els.artifactPicker.disabled = !state.artifacts.length;
    }

    function renderArtifactControls() {
      const artifact = selectedArtifact();
      const target = selectedArtifactTarget();
      if (!artifact) {
        els.artifactStatus.textContent = state.libraryError ? "reconnecting…" : "No artifact selected.";
        els.artifactVersion.replaceChildren();
        els.artifactVersion.disabled = true;
        return;
      }

      els.artifactStatus.textContent = artifact.state === "live"
        ? "live — updating"
        : `finished ${relativeAgo(artifact.updated_at)}`;
      const options = document.createDocumentFragment();
      const current = document.createElement("option");
      current.value = "live";
      current.textContent = artifact.state === "live"
        ? "Now — live, updating"
        : `Now — finished ${relativeAgo(artifact.updated_at)}`;
      options.appendChild(current);
      const total = artifact.versions.length;
      artifact.versions.forEach((version, index) => {
        const option = document.createElement("option");
        option.value = version.key;
        const outcome = version.tasks_fail > 0
          ? `${version.tasks_pass} passed, ${version.tasks_fail} failed`
          : `all ${version.tasks_pass} passed`;
        option.textContent = `Round ${total - index} — ${outcome} · ${formatVersionTime(version.finished_at)}`;
        options.appendChild(option);
      });
      els.artifactVersion.replaceChildren(options);
      els.artifactVersion.disabled = false;
      els.artifactVersion.value = state.artifactVersion;
    }

    function formatVersionTime(value) {
      const stamp = parseTime(value);
      if (!stamp) return "unknown";
      return new Date(stamp).toLocaleString([], {
        month: "short",
        day: "numeric",
        hour: "2-digit",
        minute: "2-digit"
      });
    }

    function showArtifactMessage(message) {
      els.frameWrap.replaceChildren();
      const line = document.createElement("div");
      line.className = "artifact-error";
      line.textContent = message;
      els.frameWrap.appendChild(line);
    }

    async function loadArtifactFrame(force) {
      const target = selectedArtifactTarget();
      if (!target?.src) {
        state.frameKey = "";
        showArtifactMessage(state.artifacts.length ? "Artifact path unavailable." : "No artifacts yet.");
        return;
      }
      const isLive = target.artifact.state === "live" && !target.version;
      if (!force && state.frameKey === target.key && !isLive) return;
      const request = ++state.frameRequest;
      try {
        const response = await fetch(target.src, {cache: "no-store"});
        if (!response.ok) throw new Error(`HTTP ${response.status}`);
        const raw = await response.text();
        if (request !== state.frameRequest) return;
        // The live page carries a meta refresh for standalone viewing; inside
        // this pane WE are the refresher — strip it and swap content only on
        // change, so nothing ever flashes.
        let html = raw.replace(/<meta[^>]+http-equiv=["']?refresh["']?[^>]*>/gi, "");
        // srcdoc documents have no base URL: without this, every relative
        // deliverable/work-log link 404s. Resolve against the fetched URL and
        // open results in a new tab so the pane never navigates away.
        const baseHref = new URL(target.src, window.location.href).href;
        html = html.replace(/<head([^>]*)>/i, `<head$1><base href="${baseHref}" target="_blank">`);
        if (state.frameKey === target.key && state.frameContent === html) return;
        let frame = els.frameWrap.querySelector("iframe");
        const sameDoc = frame && state.frameKey === target.key;
        const keepScroll = sameDoc ? (window.scrollY || 0) : 0;
        if (!frame || !sameDoc) {
          frame = document.createElement("iframe");
          frame.title = `Artifact: ${target.artifact.name}`;
          els.frameWrap.replaceChildren(frame);
        }
        frame.addEventListener("load", () => {
          try {
            const doc = frame.contentDocument;
            frame.style.height = Math.max(120, doc.documentElement.scrollHeight) + "px";
            doc.documentElement.style.overflowY = "hidden";
            if (keepScroll) window.scrollTo(0, keepScroll);
          } catch (_e) {}
        }, {once: true});
        frame.srcdoc = html;
        state.frameKey = target.key;
        state.frameContent = html;
      } catch (_error) {
        if (request !== state.frameRequest) return;
        state.frameKey = "";
        state.frameContent = "";
        showArtifactMessage("Could not load this artifact.");
      }
    }

    async function fetchRuns() {
      try {
        const response = await fetch("/api/runs", {cache: "no-store"});
        if (!response.ok) throw new Error(`HTTP ${response.status}`);
        const payload = await response.json();
        state.runs = normalizeRuns(payload);
        state.active = payload?.active || {};
        state.runError = null;
      } catch (error) {
        state.runError = error?.message || "runs unavailable";
      }
      renderTop();
      renderMachineStrip();
      renderLive();
    }

    function renderMachineStrip() {
      const strip = document.getElementById("machine-strip");
      if (!strip) return;
      const runs = [...state.runs].sort((a, b) => parseTime(a.started_at) - parseTime(b.started_at)).slice(-10);
      const frag = document.createDocumentFragment();
      runs.forEach(run => {
        const seg = document.createElement("button");
        seg.type = "button";
        seg.className = run.state === "live" ? "live" : (run.fail > 0 || run.state === "died" ? "fail" : "pass");
        seg.title = `${run.run_name} — ${run.state === "live" ? "live" : run.state} (${run.identity})`;
        seg.setAttribute("aria-label", seg.title);
        seg.setAttribute("aria-current", String(run.run_name === state.artifactName));
        seg.addEventListener("click", () => {
          state.artifactName = run.run_name;
          state.artifactManual = true;
          state.artifactVersion = "live";
          state.frameKey = "";
          sessionStorage.setItem(ARTIFACT_KEY, run.run_name);
          renderArtifacts();
          renderArtifactControls();
          renderLive();
          loadArtifactFrame(true);
        });
        frag.appendChild(seg);
      });
      state.rendering = true;
      strip.replaceChildren(frag);
      state.rendering = false;
    }

    async function fetchLibrary() {
      try {
        const response = await fetch("/api/library", {cache: "no-store"});
        if (!response.ok) throw new Error(`HTTP ${response.status}`);
        const payload = await response.json();
        state.artifacts = normalizeLibrary(payload);
        state.libraryError = null;
      } catch (error) {
        state.libraryError = error?.message || "library unavailable";
      }
      renderTop();
      renderArtifacts();
      loadArtifactFrame(false);
    }
    els.artifactVersion.addEventListener("change", () => {
      state.artifactVersion = els.artifactVersion.value || "live";
      state.frameKey = "";
      renderArtifactControls();
      loadArtifactFrame(true);
    });
    els.artifactPicker.addEventListener("change", () => {
      const name = els.artifactPicker.value;
      if (!name) return;
      state.artifactName = name;
      state.artifactManual = true;
      state.artifactVersion = "live";
      state.frameKey = "";
      sessionStorage.setItem(ARTIFACT_KEY, name);
      renderArtifacts();
      renderArtifactControls();
      loadArtifactFrame(true);
    });
    document.addEventListener("keydown", event => {
      if (event.key === "Escape" && state.expanded) closeWorker();
    });

    tickClock();
    renderTop();
    renderLive();
    renderArtifacts();
    fetchRuns();
    fetchLibrary();
    setInterval(tickClock, 1000);
    setInterval(fetchRuns, 1000);
    setInterval(fetchLibrary, 2000);
  })();
  </script>
</body>
</html>
